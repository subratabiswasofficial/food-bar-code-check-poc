version: "3.8"

services:
  # backend:
  #   build: ./backend
  #   container_name: backend_app
  #   ports:
  #     - "3001:3000"
  #   depends_on:
  #     - mysql
  #     - redis 
  mysql:
    image: mysql:8
    container_name: mysql-food
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: food_barcode
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: redis-cache
    ports:
      - "6379:6379"

volumes:
  mysql_data:
