<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Food Barcode Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center">

  <div class="bg-white w-full max-w-lg rounded-xl shadow-lg p-8">

    <h1 class="text-2xl font-bold text-center mb-6">
      🍱 Food Barcode Checker
    </h1>

    <!-- Barcode Input -->
    <div class="mb-4">
      <label class="block text-sm font-semibold mb-1">
        Food Barcode Number
      </label>
      <input
        id="barcode"
        type="text"
        placeholder="Enter barcode number"
        class="w-full px-4 py-2 border rounded-lg"
      />
    </div>

    <!-- Label Upload -->
    <div class="mb-4">
      <label class="block text-sm font-semibold mb-1">
        Upload Food Label Image
      </label>
      <input
        id="labelImage"
        type="file"
        accept="image/*"
        class="w-full"
      />
    </div>

    <!-- Submit -->
    <button
      id="checkFood"
      class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700"
    >
      Check Ingredients
    </button>

    <!-- Result -->
    <div id="result" class="mt-6 hidden">
      <h2 class="font-semibold mb-2">Ingredients:</h2>
      <p id="ingredientsText" class="text-gray-700"></p>
    </div>

    <!-- Logout -->
    <button
      id="logout"
      class="mt-6 text-sm text-red-500 block mx-auto"
    >
      Logout
    </button>

  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/src/home.js"></script>

</body>
</html>
