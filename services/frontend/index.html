<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body class="h-screen flex items-center justify-center bg-gradient-to-r from-indigo-500 to-purple-600">

  <!-- Open Modal Button -->
  <button id="openModal"
    class="px-6 py-3 bg-white text-indigo-600 font-semibold rounded-lg shadow-lg">
    Open Login
  </button>

  <!-- Overlay -->
  <div id="overlay"
    class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">

    <!-- Modal -->
    <div class="bg-white w-full max-w-md rounded-xl p-8 shadow-lg">

      <!-- Tabs -->
      <div class="flex mb-6">
        <button id="loginTab"
          class="w-1/2 py-2 font-semibold border-b-2 border-indigo-600 text-indigo-600">
          Login
        </button>
        <button id="registerTab"
          class="w-1/2 py-2 font-semibold border-b-2 border-transparent text-gray-500">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <input id="loginEmail" type="email" placeholder="Email"
          class="w-full mb-3 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />

        <input id="loginPassword" type="password" placeholder="Password"
          class="w-full mb-4 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />

        <button
          class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
          Login
        </button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="hidden">
        <input id="regName" type="text" placeholder="Name"
          class="w-full mb-3 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" />

        <input id="regEmail" type="email" placeholder="Email"
          class="w-full mb-3 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" />

        <input id="regPassword" type="password" placeholder="Password"
          class="w-full mb-4 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" />

        <button
          class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700">
          Register
        </button>
      </form>

      <!-- Close Button -->
      <button id="closeModal"
        class="mt-4 block mx-auto text-sm text-gray-500 hover:text-gray-800">
        Close
      </button>
    </div>
  </div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script type="module" src="/src/main.js"></script>
</body>
</html>
