<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodScan — Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#0f1117',
            card:    '#181c27',
            card2:   '#1e2335',
            line:    '#2a2f42',
            linel:   '#363c54',
            accent:  '#6C8EEF',
            accentl: '#89a4f5',
            muted:   '#7c84a0',
            faint:   '#3a3f56',
            txt:     '#e8eaf6',
          },
          fontFamily: {
            clash: ['"Clash Display"', 'sans-serif'],
            syne:  ['"Syne"', 'sans-serif'],
            mono:  ['"DM Mono"', 'monospace'],
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Syne:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />


  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Syne', sans-serif; background: #0f1117; color: #e8eaf6; }

    /* Background radial glow */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 30% 20%, rgba(108,142,239,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 75% 80%, rgba(167,139,250,0.08) 0%, transparent 60%);
    }

    /* Input style */
    .inp {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2a2f42;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e8eaf6;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .inp:focus { border-color: #6C8EEF; box-shadow: 0 0 0 3px rgba(108,142,239,0.15); }
    .inp::placeholder { color: #3a3f56; }

    /* Tab active/inactive */
    .tab-active {
      color: #6C8EEF;
      border-bottom: 2px solid #6C8EEF;
      font-weight: 600;
    }
    .tab-inactive {
      color: #7c84a0;
      border-bottom: 2px solid transparent;
      font-weight: 500;
    }

    /* Primary button */
    .btn-primary {
      background: linear-gradient(135deg, #6C8EEF, #5b7de8);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      width: 100%;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,142,239,0.3); }
    .btn-primary:active { transform: translateY(0); box-shadow: none; }

    .btn-purple {
      background: linear-gradient(135deg, #a78bfa, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      width: 100%;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-purple:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(139,92,246,0.3); }
    .btn-purple:active { transform: translateY(0); box-shadow: none; }

    /* Toast */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: 12px; font-size: 0.88rem; font-weight: 500;
      z-index: 9999; display: none; white-space: nowrap;
      font-family: 'Syne', sans-serif;
    }
    #toast.success { background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; }
    #toast.error   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: #f87171; }

    /* Animations */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes modalIn  { from { opacity:0; transform:scale(.95) translateY(12px); } to { opacity:1; transform:scale(1) translateY(0); } }

    .anim-up   { animation: fadeUp   .45s ease both; }
    .anim-down { animation: fadeDown .45s ease both; }
    #modal-box { animation: modalIn .3s ease both; }

    /* Overlay backdrop */
    #overlay { backdrop-filter: blur(6px); }
  </style>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">

<!-- ── Landing Hero ── -->
<div class="relative z-10 text-center px-6 anim-down">


  <!-- Badge -->
  <div class="inline-flex items-center gap-2 rounded-full px-4 py-1.5 mb-6 font-mono text-xs tracking-widest"
    style="background:rgba(108,142,239,0.1);border:1px solid rgba(108,142,239,0.25);color:#89a4f5">
    <span class="w-1.5 h-1.5 rounded-full bg-accentl inline-block" style="animation:pulse 2s ease infinite"></span>
    FOOD SCAN v2.0
  </div>

  <!-- Headline -->
  <h1 class="font-clash font-bold leading-tight tracking-tight mb-4" style="font-size:clamp(2rem,6vw,3.6rem)">
    Know exactly what's
    <span style="background:linear-gradient(135deg,#6C8EEF,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">
      in your food
    </span>
  </h1>

  <p class="mb-10 max-w-md mx-auto" style="color:#7c84a0;font-size:1rem;line-height:1.7">
    Scan barcodes or upload food label images to instantly reveal ingredients, allergens &amp; nutrition facts.
  </p>

  <!-- Feature pills -->
  <div class="flex flex-wrap justify-center gap-3 mb-10">
    <span class="px-4 py-1.5 rounded-full text-sm font-mono" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);color:#4ade80">🧪 Ingredients</span>
    <span class="px-4 py-1.5 rounded-full text-sm font-mono" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:#f87171">⚠️ Allergens</span>
    <span class="px-4 py-1.5 rounded-full text-sm font-mono" style="background:rgba(108,142,239,0.1);border:1px solid rgba(108,142,239,0.2);color:#89a4f5">📊 Nutrition</span>
    <span class="px-4 py-1.5 rounded-full text-sm font-mono" style="background:rgba(250,204,21,0.1);border:1px solid rgba(250,204,21,0.2);color:#facc15">🏆 Nutri-Score</span>
  </div>

 <a href="auth.html"
  class="inline-flex items-center gap-2 px-8 py-4 rounded-2xl font-semibold text-white text-base transition-all"
  style="background:linear-gradient(135deg,#6C8EEF,#5b7de8)">
  Get Started
</a>


<!-- Toast notification -->
<div id="toast"></div>

<script src="src/main.js"></script>
</body>
</html>
